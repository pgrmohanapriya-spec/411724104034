<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive website</title>
    <link rel="stylesheet" href="task.css">
</head>
<body>
    <nav>
        <a href="#">Nature</a>
        <a href="#">Image</a>
        <a href="#">Video</a>
    </nav>
    <h1>My responsive website</h1>
    <img src="image2.jpg" alt="Nature">
    <video controls>
        <source src="video.mp4" type="video/mp4">
    </video>
    <table>
            <tr>
                <th>1</th>
                <th>2</th>
                <th>3</th>
        </tr>
        <tr>
            <td>Tulip</td>
            <td>Lotus</td>
            <td>Rose</td>
        </tr>
        <tr>
            <td>Sunflower</td>
            <td>Marigold</td>
            <td>Orchid</td>
        </tr>
    </table>
    <button>Click Me</button>
    <div class="grid-container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
        <div class="box">8</div>
    </div>
    
</body>
</html>
